name: Test message-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/act-harness
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create test file and message file
        run: |
          echo "test content for message-file scenario" > "$GITHUB_WORKSPACE/test-mf-file.txt"
          echo "chore: test commit using message-file input" > "$GITHUB_WORKSPACE/commit-message.txt"

      - id: action
        uses: .
        continue-on-error: true
        with:
          files: test-mf-file.txt
          message-file: commit-message.txt
          if-no-commit: skip
          token: ${{ github.token }}

      - name: Assert action ran with message-file input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action may fail due to API limitations in act environment,
          # but it must have started (not skipped or setup error)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with files and message-file inputs"
