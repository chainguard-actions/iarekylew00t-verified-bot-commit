name: Test no-changes behavior with if-no-commit skip
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/act-harness
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with files and if-no-commit=skip
        id: action
        uses: .
        continue-on-error: true
        with:
          files: "*.md"
          message: "chore: test no-changes skip behavior"
          if-no-commit: "skip"
          auto-stage: "false"
          token: ${{ github.token }}

      - name: Assert action ran (not skipped as a step)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action may succeed (no commit needed) or fail due to API limits in act
          # but it must not be skipped as a workflow step
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action step was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with files, message, and if-no-commit=skip"
