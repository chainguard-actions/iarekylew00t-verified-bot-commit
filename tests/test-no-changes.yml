name: Test no-changes behavior with if-no-commit skip
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/act-harness
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          files: "*.nonexistent-pattern-xyz"
          message: "chore: test with no matching files"
          if-no-commit: skip
          auto-stage: 'false'
          token: ${{ github.token }}

      - name: Assert action ran with if-no-commit skip
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "action outcome: $OUTCOME"
          # The action may fail due to API limitations in act environment,
          # but it must have started (not skipped or setup error)
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped unexpectedly"
            exit 1
          fi
          echo "PASS: action ran with if-no-commit=skip"
